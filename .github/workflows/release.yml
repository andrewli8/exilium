name: Release

# Compile standalone Exilium binaries for every platform and attach them to a
# GitHub Release when a v* tag is pushed. Bun cross-compiles all targets from
# one runner with its SQLite embedded, so there is no per-platform native
# rebuild and no Node.js needed to run the result.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile || npm ci
      - name: Typecheck and test
        run: npx tsc --noEmit && npm test && npm run eval
      - name: Build binaries
        run: bash scripts/build-binaries.sh
      - name: Checksums
        run: cd dist && sha256sum exilium-* > SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/exilium-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
