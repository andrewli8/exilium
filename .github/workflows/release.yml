name: Release

# Build per-platform portable tarballs and attach them to a GitHub Release
# whenever a v* tag is pushed. Each tarball is the repo source plus a
# platform-native node_modules (better-sqlite3 is a native module and must be
# built per platform), so it runs with only a Node.js runtime present.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: darwin-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install production dependencies
        # Builds better-sqlite3 for this runner's platform/arch.
        run: npm ci --omit=dev

      - name: Add runtime tsx
        # bin/exilium.js launches the CLI through tsx. tsx is declared as a
        # devDependency, so --omit=dev drops it; re-add it (and only it) at the
        # version the lockfile pins, without touching package.json.
        run: npm install --no-save "tsx@$(node -p "require('./package.json').devDependencies.tsx")"

      - name: Stage portable tree
        run: |
          set -euo pipefail
          stage="exilium-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          dest="dist-release/${stage}"
          mkdir -p "$dest"
          cp -R bin src node_modules package.json package-lock.json "$dest/"
          [ -f README.md ] && cp README.md "$dest/" || true
          [ -f LICENSE ] && cp LICENSE "$dest/" || true

          # Portable launcher for manual/no-symlink use inside the extracted tree.
          cp scripts/portable-run.sh "$dest/run.sh"
          chmod +x "$dest/run.sh" "$dest/bin/exilium.js"

          echo "stage=$stage" >> "$GITHUB_ENV"

      - name: Create tarball and checksum
        run: |
          set -euo pipefail
          cd dist-release
          tar -czf "${stage}.tar.gz" "$stage"
          shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.stage }}
          path: |
            dist-release/*.tar.gz
            dist-release/*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected assets
        run: ls -R artifacts

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
